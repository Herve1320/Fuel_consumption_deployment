name: Fuel Project CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We skip the full 'apache-airflow' to avoid the google-re2/Bazel error
          # If you need Airflow classes for imports, use the lighter client
          pip install apache-airflow-client 
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}/include
        run: |
          # This runs your new tests and ignores the Airflow examples
          pytest tests/tests.py

      - name: Build Docker Image
        run: |
          # Ensures your Dockerfile.api is valid and can build
          docker build -t fuel-consumption-api:latest -f Dockerfile.api .
