name: Fuel Project CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Using the lighter client to avoid Bazel/re2 compilation errors on the runner
          pip install apache-airflow-client 
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          # This tells Python to look in the current directory and the 'include' folder
          PYTHONPATH: .:${{ github.workspace }}/include
        run: |
          pytest tests/tests.py

      - name: Build Docker Image
        run: |
          # Validates that the Dockerfile.api is functional for deployment
          docker build -t fuel-consumption-api:latest -f Dockerfile.api .
